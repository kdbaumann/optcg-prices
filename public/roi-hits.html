<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Set Hits Viewer — Fulcrum Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#e8b84b;--bg:#080810;--surface:#0f0f1c;--surface2:#14142a;--border:#1e1e38;--text:#dde0f0;--muted:#6b6b90;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}
.hdr{background:linear-gradient(135deg,#0a0a18,#12091f);border-bottom:2px solid var(--gold);padding:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.hdr h1{font-family:'Cinzel Decorative',serif;font-size:clamp(.9rem,2.5vw,1.4rem);color:var(--gold);}
.set-badge{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:4px 12px;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900;color:var(--gold);letter-spacing:.06em;}
.back{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.1em;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:5px 12px;border-radius:4px;}
.back:hover{color:var(--gold);border-color:var(--gold);}
.main{max-width:1100px;margin:0 auto;padding:20px;}

/* Summary bar */
.sumbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px;}
.sc{background:var(--surface);padding:10px 14px;}
.sc .sl{font-size:.62rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.06em;}
.sc .sv{font-size:1.2rem;font-family:'Barlow Condensed',sans-serif;font-weight:900;margin-top:2px;}

/* Rarity section headers */
.rar-section{margin-bottom:20px;}
.rar-hdr{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;padding:6px 12px;border-radius:4px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.rar-hdr .count{font-size:.62rem;opacity:.7;}

/* Hit cards grid */
.hits-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.hit-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;position:relative;cursor:pointer;transition:border-color .15s;}
.hit-card:hover{border-color:var(--gold);}
.hit-card.lottery{border-left:3px solid #f87171;}
.hit-img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:5px;background:var(--surface2);display:block;margin-bottom:8px;}
.hit-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.85rem;color:var(--text);margin-bottom:2px;}
.hit-variant{font-size:.65rem;color:var(--muted);margin-bottom:6px;line-height:1.5;}
.hit-prices{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px;}
.hit-price{background:var(--surface2);border-radius:3px;padding:4px 6px;}
.hit-price .pl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.hit-price .pv{font-size:.8rem;font-family:'Barlow Condensed',sans-serif;font-weight:900;}
.hit-rate{font-size:.62rem;color:var(--muted);border-top:1px solid var(--border);padding-top:5px;margin-top:3px;}
.pill{display:inline-block;padding:1px 6px;border-radius:3px;font-weight:700;font-size:.65rem;}
.pg{background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25);}
.py{background:rgba(251,191,36,.10);color:#fbbf24;border:1px solid rgba(251,191,36,.2);}
.pb{background:rgba(248,113,113,.10);color:#f87171;border:1px solid rgba(248,113,113,.2);}
.rarity-badge{display:inline-block;padding:1px 5px;border-radius:2px;font-size:.6rem;font-weight:700;margin-right:3px;}
.r-mr{background:rgba(232,184,75,.15);color:var(--gold);}
.r-gold{background:rgba(251,191,36,.15);color:#fbbf24;}
.r-red{background:rgba(248,113,113,.15);color:#f87171;}
.r-sp{background:rgba(96,165,250,.12);color:#60a5fa;}
.r-sec{background:rgba(45,212,191,.10);color:#2dd4bf;}
.r-tr{background:rgba(167,139,250,.12);color:#a78bfa;}
.r-gp{background:rgba(240,208,128,.15);color:#f0d080;}
.r-par{background:rgba(100,116,139,.15);color:#94a3b8;}
.lottery-tag{font-size:.58rem;color:#f87171;margin-left:3px;}
.lookup-btn{width:100%;margin-top:6px;padding:4px;background:rgba(232,184,75,.06);border:1px solid rgba(232,184,75,.3);border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;color:var(--gold);cursor:pointer;letter-spacing:.05em;text-align:center;text-decoration:none;display:block;}
.lookup-btn:hover{background:rgba(232,184,75,.12);}
.not-found{text-align:center;padding:60px 20px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.fbtn{background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer;padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.fbtn:hover,.fbtn.on{border-color:var(--gold);color:var(--gold);background:rgba(232,184,75,.06);}
</style>
</head>

  <div class="filter-bar">

</div>

const CDN = 'https://en.onepiece-cardgame.com/images/cardlist/card';
const RARITY_ORDER = {'r-red':1,'r-gold':2,'r-gp':3,'r-mr':4,'r-sp':5,'r-tr':6,'r-sec':7,'r-par':8};

let currentSort = 'value';

function fmoney(n){
  if(!n && n!==0) return '—';
  const abs = Math.abs(n);
  const s = abs >= 1000 ? '$'+abs.toLocaleString('en-US',{maximumFractionDigits:0}) : '$'+abs.toFixed(0);
  return n < 0 ? '-'+s : s;
}
function frac(n){
  if(n >= 1) return n.toFixed(1)+'/case';
  const inv = Math.round(1/n);
  return '1/'+inv+' cases';
}

function buildPage(set){
  document.getElementById('set-title').textContent = set.id + ' — ' + set.name;
  document.getElementById('set-badge').textContent = set.id;
  document.getElementById('s-cost').textContent = fmoney(set.caseCost);
  document.getElementById('s-ev').textContent = fmoney(set.parEV * set.boxCnt) + '/case';
  const topPull = [...set.pulls].sort((a,b)=>b.rawVal-a.rawVal)[0];
  document.getElementById('s-chase').textContent = topPull ? fmoney(topPull.rawVal) : '—';
  const mrPull = set.pulls.find(p=>p.rarity==='r-mr' && p.perCase > 0.5);
  document.getElementById('s-mr-rate').textContent = mrPull ? frac(mrPull.perCase) : '—';
  document.getElementById('s-hits').textContent = set.pulls.length;
  renderHits(set);
}

function renderHits(set){
  let pulls = [...set.pulls];
  
  if(currentSort === 'value') pulls.sort((a,b)=>b.rawVal - a.rawVal);
  else if(currentSort === 'rarity') pulls.sort((a,b)=>(RARITY_ORDER[a.rarity]||9)-(RARITY_ORDER[b.rarity]||9) || b.rawVal-a.rawVal);
  else if(currentSort === 'rate') pulls.sort((a,b)=>b.perCase-a.perCase);
  else if(currentSort === 'psa') pulls.sort((a,b)=>(b.psa10||0)-(a.psa10||0));

  const content = document.getElementById('content');
  content.innerHTML = '';

  pulls.forEach(p => {
    const card = document.createElement('div');
    card.className = 'hit-card' + (p.lottery ? ' lottery' : '');
    
    const imgSrc = `${CDN}/${p.img}.png`;
    const lookupCode = p.img ? p.img.replace(/_p\d$|_p\d\d$/, '') : '';
    
    const pricePairs = [
      {label:'Raw NM',val:p.rawVal,cls:p.rawVal>=1000?'cg':p.rawVal>=200?'cy':''},
      {label:'PSA 10 est.',val:p.psa10,cls:'cp'},
    ];
    
    card.innerHTML = `
      <img class="hit-img" src="${imgSrc}" alt="${p.label}"
        onerror="this.style.background='#1a1a2e';this.style.opacity='.4'">
      <div class="hit-name">
        <span class="rarity-badge ${p.rarity}">${p.rarity.replace('r-','').toUpperCase()}</span>
        ${p.lottery ? '<span class="lottery-tag">🎰 LOTTERY</span>' : ''}
      </div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.85rem;color:#eef2f8;margin:3px 0 2px">${p.label}</div>
      <div class="hit-variant">${p.note}</div>
      <div class="hit-prices">
        <div class="hit-price">
          <div class="pl">Raw NM</div>
          <div class="pv" style="color:${p.rawVal>=1000?'#4ade80':p.rawVal>=200?'#fbbf24':'#dde0f0'}">${fmoney(p.rawVal)}</div>
        </div>
        <div class="hit-price">
          <div class="pl">PSA 10</div>
          <div class="pv" style="color:#a78bfa">${p.psa10 ? fmoney(p.psa10) : '—'}</div>
        </div>
      </div>
      <div class="hit-rate">
        Pull rate: <strong>${frac(p.perCase)}</strong>
        &nbsp;·&nbsp; EV/case: <strong style="color:#60a5fa">${fmoney(p.perCase * p.rawVal)}</strong>
      </div>
      ${lookupCode ? `<a class="lookup-btn" href="card-lookup.html?code=${lookupCode}" target="_blank">🔍 Look up ${lookupCode} →</a>` : ''}
    `;
    
    content.appendChild(card);
  });
}

function hitSort(s){
  currentSort = s;
  ['val','rar','rate','psa'].forEach(x => document.getElementById('f-'+x).classList.remove('on'));
  const map = {value:'val',rarity:'rar',rate:'rate',psa:'psa'};
  document.getElementById('f-'+map[s])?.classList.add('on');
  const setId = new URLSearchParams(window.location.search).get('set');
  const set = HITS_SETS.find(s=>s.id===setId);
  if(set) renderHits(set);
}

// Init
const params = new URLSearchParams(window.location.search);
const setId = params.get('set');
const set = HITS_SETS.find(s => s.id === setId);

if(set) {
  buildPage(set);
} else {
  document.getElementById('set-title').textContent = 'Set Not Found';
  document.getElementById('content').innerHTML = `
    <div class="not-found">
      <div style="font-size:2rem;margin-bottom:12px">🏴‍☠️</div>
      <div>Set "${setId || 'unknown'}" not found.</div>
      <div style="margin-top:8px"><a href="index.html" style="color:var(--gold)">← Back to Price Guide</a></div>
    </div>`;
}
</script>
