# ── Netlify configuration for Fulcrum Cards OPTCG Price Guide ─────────────────

[build]
  publish = "public"

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# ── Scheduled functions ───────────────────────────────────────────────────────
# update-prices: daily 6 AM UTC — fetches card prices from OPCardlist
# warm-card-images: weekly Sunday 3 AM UTC — pre-caches card images to Blobs

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Long cache for HTML (picks up price updates within 1 hour) ────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# ── Card images served from /card-img/ — immutable once cached ───────────────
[[headers]]
  for = "/card-img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── API routes — short cache ──────────────────────────────────────────────────
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control        = "public, max-age=3600, stale-while-revalidate=86400"
    Access-Control-Allow-Origin = "*"
