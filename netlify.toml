[build]
  publish = "public"
  command = "node scripts/download-images.mjs"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Run price refresh every day at 6am UTC (midnight US Central, 9pm US Pacific)
[[scheduled-functions]]
  name = "refresh-prices"
  cron = "0 6 * * *"
