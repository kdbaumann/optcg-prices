[build]
  publish = "public"
  command = "node scripts/download-all-images.mjs"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Prices refresh every day at 6am UTC (midnight US Central)
[[scheduled-functions]]
  name = "refresh-prices"
  cron = "0 6 * * *"

# Images sync every Sunday at 4am UTC — checks for new sets + re-downloads stale images
[[scheduled-functions]]
  name = "sync-images"
  cron = "0 4 * * 0"
