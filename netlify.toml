# ── Netlify configuration for Fulcrum Cards OPTCG Price Guide ─────────────────

[build]
  publish = "public"

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# ── Scheduled functions ───────────────────────────────────────────────────────
# update-prices:      daily      06:00 UTC — scrape OPCardlist
# refresh-slabs:      daily      09:00 UTC — refresh PSA/BGS slab data
# warm-card-images:   weekly Sun 03:00 UTC — pre-cache card images
# compact-snapshots:  weekly Mon 07:00 UTC — prune old price snapshots
#
# IMPORTANT: scheduled functions must export ONLY `{ schedule }` in their
# config — adding `path` fails the build with "Scheduled functions must
# not specify a custom path". They're always invokable manually at
# /.netlify/functions/{name}.

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Long cache for HTML (picks up price updates within 1 hour) ────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# ── Card images served from /card-img/ — immutable once cached ───────────────
[[headers]]
  for = "/card-img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── API routes — short cache ──────────────────────────────────────────────────
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control        = "public, max-age=3600, stale-while-revalidate=86400"
    Access-Control-Allow-Origin = "*"
